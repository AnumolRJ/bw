/* HERO */
.hero{

    height:110vh;
    background: url('http://anumolrj.github.io/bw/bg.jpeg') no-repeat center center / cover;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:60px;
}

.hero-text{
    max-width:500px;
}

.hero h1{
    font-family:'Pacifico';
    font-size:40px;
}

.hero h2{
    font-size:70px;
    color:#ff7eb3;
    text-shadow:0 0 25px #ff7eb3;
}

.hero p{
    margin:20px 0;
}

.btn{
    background:#ff6b9c;
    padding:12px 25px;
    border-radius:30px;
    text-decoration:none;
    color:white;
}

/* CURVE SECTION */
.section{
    background:white;
    padding:60px 20px;
    border-radius:60px 60px 0 0;
    margin-top:-80px;
    text-align:center;
}

.section h2{
    font-family:'Pacifico';
    color:#ff6b9c;
    margin-bottom:40px;
}

/* CARDS */
.cards{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    width:180px;
    background:#fff;
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.card img{
    width:60px;
}

.card p{
    font-size:13px;
}

/* MESSAGE */
.message{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    flex-wrap:wrap;
    padding:50px;
}

.letter{
    background:white;
    padding:25px;
    border-radius:15px;
    width:350px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* POLAROIDS */
.polaroids{
    display:flex;
    gap:15px;
}

.polaroid{
    width:140px;
    background:white;
    padding:10px;
    transform:rotate(-5deg);
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.polaroid:nth-child(2){transform:rotate(5deg);}
.polaroid:nth-child(3){transform:rotate(-8deg);}

.polaroid img{
    width:100%;
}

/* WISH SECTION */
.wish{
    background:linear-gradient(135deg,#5f0a87,#a4508b);
    color:white;
    padding:40px;
    border-radius:20px;
    margin:40px;
    text-align:center;
}

.wish h2{
    font-family:'Pacifico';
}

.wish-items{
    display:flex;
    justify-content:space-around;
    flex-wrap:wrap;
    margin-top:20px;
}

/* FOOTER */
footer{
    text-align:center;
    color:#ff6b9c;
    padding:20px;
}
</style>
</head>
